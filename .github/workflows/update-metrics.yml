name: Update stock metrics

on:
  schedule:
    # 平日 17:30 JST (= 08:30 UTC)
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: jobs/requirements.txt

      - name: Install dependencies
        run: pip install -r jobs/requirements.txt

      - name: Fetch metrics
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python jobs/fetch_metrics.py
